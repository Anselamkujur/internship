<!DOCTYPE html>
<html>
<head>
    <title>HTML & CSS Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
        }

        nav {
            background: #333;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        .container {
            padding: 20px;
        }

        img {
            width: 300px;
            border-radius: 10px;
        }

        form {
            margin-top: 20px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        button {
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>This is a simple webpage using HTML and CSS.</p>

        <img src="img/images.png" alt="Sample Image">

        <form>
            <br>
            <input type="text" placeholder="Enter your name">
            <button type="submit">Submit</button>
        </form>
    </div>

</body>
</html>
