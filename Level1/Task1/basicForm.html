<!DOCTYPE html>
<html>
<head>
    <title>Simple Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        button {
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Contact Form</h2>

    <form>
        <input type="text" placeholder="Enter your name">
        <button type="submit">Submit</button>
    </form>

</body>
</html>
