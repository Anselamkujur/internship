<!DOCTYPE html>
<html>
<head>
    <title>Responsive Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .box {
            flex: 1;
            padding: 20px;
            background-color: lightblue;
            text-align: center;
        }

        /* Mobile View */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .box {
                background-color: lightgreen;
            }
        }
    </style>
</head>
<body>

<h1 style="text-align:center;">Responsive Webpage</h1>

<div class="container">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
</div>

</body>
</html>
