<!DOCTYPE html>
<html>
<head>
    <title>Hamburger Menu</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        nav {
            background: #333;
            color: white;
            padding: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .menu {
            display: flex;
            list-style: none;
            gap: 20px;
        }

        .menu a {
            color: white;
            text-decoration: none;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Hide checkbox */
        #menu-toggle {
            display: none;
        }

        /* Hamburger Icon */
        .hamburger {
            display: none;
            font-size: 28px;
            cursor: pointer;
        }

        /* Mobile View */
        @media (max-width: 768px) {

            .hamburger {
                display: block;
            }

            .menu {
                display: none;
                flex-direction: column;
                background: #444;
                width: 100%;
                margin-top: 10px;
                padding: 10px;
            }

            #menu-toggle:checked + .hamburger + .menu {
                display: flex;
            }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">

        <div class="logo">MySite</div>

        <input type="checkbox" id="menu-toggle">

        <label for="menu-toggle" class="hamburger">
            ☰
        </label>

        <ul class="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

    </div>
</nav>

</body>
</html>
